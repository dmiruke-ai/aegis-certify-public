<svg xmlns="http://www.w3.org/2000/svg" width="680" height="580" viewBox="0 0 680 580" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">

  <!-- Background -->
  <rect width="680" height="580" fill="#0f1115"/>

  <!-- Layer 1: External Integrations -->
  <rect x="40" y="20" width="600" height="80" rx="6" fill="#1c2030" stroke="#6c7385" stroke-width="1.5"/>
  <text x="340" y="52" text-anchor="middle" fill="#9da4b3" font-size="11" letter-spacing="0.8" font-weight="600">EXTERNAL INTEGRATIONS</text>
  <text x="340" y="74" text-anchor="middle" fill="#6c7385" font-size="12">OPA · Kubernetes · CI/CD · Policy Engines</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="100" x2="340" y2="128" stroke="#6c7385" stroke-width="1.5"/>
  <polygon points="340,132 334,122 346,122" fill="#6c7385"/>

  <!-- Layer 2: Public Interfaces -->
  <rect x="40" y="132" width="600" height="80" rx="6" fill="#1c2030" stroke="#6aa7ff" stroke-width="1.5"/>
  <line x1="40" y1="132" x2="40" y2="212" stroke="#6aa7ff" stroke-width="3" stroke-linecap="round"/>
  <text x="340" y="164" text-anchor="middle" fill="#6aa7ff" font-size="11" letter-spacing="0.8" font-weight="600">AEGIS PUBLIC INTERFACES</text>
  <text x="340" y="186" text-anchor="middle" fill="#9da4b3" font-size="12">REST API · gRPC · Python SDK · CLI</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="212" x2="340" y2="240" stroke="#6aa7ff" stroke-width="1.5"/>
  <polygon points="340,244 334,234 346,234" fill="#6aa7ff"/>

  <!-- Layer 3: Control Plane -->
  <rect x="40" y="244" width="600" height="80" rx="6" fill="#1a1030" stroke="#b48cff" stroke-width="1.5"/>
  <line x1="40" y1="244" x2="40" y2="324" stroke="#b48cff" stroke-width="3" stroke-linecap="round"/>
  <text x="340" y="276" text-anchor="middle" fill="#b48cff" font-size="11" letter-spacing="0.8" font-weight="600">AEGIS CONTROL PLANE</text>
  <text x="340" y="298" text-anchor="middle" fill="#9da4b3" font-size="12">Gates G1–G17 · Non-bypassable · FAIL-dominant</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="324" x2="340" y2="352" stroke="#b48cff" stroke-width="1.5"/>
  <polygon points="340,356 334,346 346,346" fill="#b48cff"/>

  <!-- Layer 4: Assurance Kernel -->
  <rect x="40" y="356" width="600" height="80" rx="6" fill="#2a1010" stroke="#f06c6c" stroke-width="1.5"/>
  <line x1="40" y1="356" x2="40" y2="436" stroke="#f06c6c" stroke-width="3" stroke-linecap="round"/>
  <text x="340" y="388" text-anchor="middle" fill="#f06c6c" font-size="11" letter-spacing="0.8" font-weight="600">AEGIS ASSURANCE KERNEL</text>
  <text x="340" y="410" text-anchor="middle" fill="#9da4b3" font-size="12">Predicates · PCUs · Lattice · Matroid Logic</text>

  <!-- Arrow 4→5 -->
  <line x1="340" y1="436" x2="340" y2="464" stroke="#f06c6c" stroke-width="1.5"/>
  <polygon points="340,468 334,458 346,458" fill="#f06c6c"/>

  <!-- Layer 5: Evidence & Registry -->
  <rect x="40" y="468" width="600" height="80" rx="6" fill="#0f2418" stroke="#5fc77a" stroke-width="1.5"/>
  <line x1="40" y1="468" x2="40" y2="548" stroke="#5fc77a" stroke-width="3" stroke-linecap="round"/>
  <text x="340" y="500" text-anchor="middle" fill="#5fc77a" font-size="11" letter-spacing="0.8" font-weight="600">EVIDENCE &amp; REGISTRY LAYER</text>
  <text x="340" y="522" text-anchor="middle" fill="#9da4b3" font-size="12">PCU Registry · Evidence Store · Trace Log</text>

</svg>
